<script>
'use strict';
const DB_NAME='ContaTecnicaDB', DB_VERSION=3, SCHEMA_VERSION=3, LEGACY_KEYS=['contatecnica_fase1_v1','contatecnica_fases_1_2_v2','contatecnica_fase2_v2'];
const STORES=['configuracion','empresas','periodos','cuentas','terceros','centrosCostos','tiposComprobante','consecutivos','comprobantes','documentosSoporte','abonos','cierres','usuarios','auditoria','integridad'];
const today=()=>{const d=new Date(),o=d.getTimezoneOffset();return new Date(d.getTime()-o*60000).toISOString().slice(0,10)};
const now=()=>new Date().toISOString();
const uid=p=>p+'_'+Date.now().toString(36)+'_'+crypto.getRandomValues(new Uint32Array(1))[0].toString(36);
const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const clone=o=>structuredClone(o);
const money=n=>new Intl.NumberFormat('es-CO',{style:'currency',currency:app.config?.moneda||'COP',maximumFractionDigits:0}).format(Number(n||0));
const num=n=>new Intl.NumberFormat('es-CO',{minimumFractionDigits:2,maximumFractionDigits:2}).format(Number(n||0));
const ym=d=>String(d||'').slice(0,7), yearOf=d=>Number(String(d||'').slice(0,4)), monthOf=d=>Number(String(d||'').slice(5,7));
const canonical=o=>JSON.stringify(sortObject(o));
function sortObject(x){if(Array.isArray(x))return x.map(sortObject);if(x&&typeof x==='object')return Object.keys(x).sort().reduce((a,k)=>(a[k]=sortObject(x[k]),a),{});return x}
function reqP(r){return new Promise((res,rej)=>{r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
function txP(tx){return new Promise((res,rej)=>{tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);tx.onabort=()=>rej(tx.error||new Error('Transacción abortada'))})}
async function sha256(text){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(text));return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')}
function bytesToB64(b){let s='';new Uint8Array(b).forEach(x=>s+=String.fromCharCode(x));return btoa(s)}
function b64ToBytes(s){const x=atob(s),a=new Uint8Array(x.length);for(let i=0;i<x.length;i++)a[i]=x.charCodeAt(i);return a}
async function deriveKey(password,salt,usage){const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(password),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:210000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,usage)}
async function hashPassword(password,saltB64=''){const salt=saltB64?b64ToBytes(saltB64):crypto.getRandomValues(new Uint8Array(16));const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(password),'PBKDF2',false,['deriveBits']);const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt,iterations:210000,hash:'SHA-256'},base,256);return{salt:bytesToB64(salt),hash:bytesToB64(bits),iterations:210000}}
async function verifyPassword(password,u){const h=await hashPassword(password,u.passwordSalt);return h.hash===u.passwordHash}

const DB={db:null,
 async open(){if(this.db)return this.db;this.db=await new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VERSION);r.onupgradeneeded=e=>upgrade(r.result,e.oldVersion,r.transaction);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);r.onblocked=()=>alert('Cierre otras pestañas de ContaTécnica para actualizar la base de datos.')});this.db.onversionchange=()=>this.db.close();return this.db},
 async get(store,key){const db=await this.open(),tx=db.transaction(store,'readonly');return reqP(tx.objectStore(store).get(key))},
 async getAll(store){const db=await this.open(),tx=db.transaction(store,'readonly');return reqP(tx.objectStore(store).getAll())},
 async put(store,value){const db=await this.open(),tx=db.transaction(store,'readwrite');tx.objectStore(store).put(value);await txP(tx);return value},
 async delete(store,key){const db=await this.open(),tx=db.transaction(store,'readwrite');tx.objectStore(store).delete(key);await txP(tx)},
 async getAllIndex(store,index,query=null){const db=await this.open(),tx=db.transaction(store,'readonly'),idx=tx.objectStore(store).index(index);return reqP(idx.getAll(query===null?undefined:query))},
 async countIndex(store,index,query=null){const db=await this.open(),tx=db.transaction(store,'readonly'),idx=tx.objectStore(store).index(index);return reqP(idx.count(query===null?undefined:query))},
 async pageIndex(store,index,query,page=1,pageSize=25,direction='prev'){const db=await this.open(),tx=db.transaction(store,'readonly'),idx=tx.objectStore(store).index(index),range=query===null?null:IDBKeyRange.only(query),rows=[];let skipped=(page-1)*pageSize;await new Promise((res,rej)=>{const r=idx.openCursor(range,direction);r.onerror=()=>rej(r.error);r.onsuccess=()=>{const c=r.result;if(!c)return res();if(skipped){skipped--;c.continue();return}if(rows.length<pageSize){rows.push(c.value);c.continue()}else res()}});return rows},
 async clearAll(){const db=await this.open(),tx=db.transaction(STORES,'readwrite');STORES.forEach(s=>tx.objectStore(s).clear());await txP(tx)}
};
function createStore(db,name,opts={keyPath:'id'}){return db.objectStoreNames.contains(name)?null:db.createObjectStore(name,opts)}
function idx(store,name,key,opts={}){if(store&&!store.indexNames.contains(name))store.createIndex(name,key,opts)}
function upgrade(db,oldVersion,tx){
 const config=createStore(db,'configuracion');
 const empresas=createStore(db,'empresas'); idx(empresas,'estado','estado');
 const periodos=createStore(db,'periodos'); idx(periodos,'empresaId','empresaId');idx(periodos,'vigencia','vigencia');idx(periodos,'estado','estado');idx(periodos,'empresaVigencia',['empresaId','vigencia'],{unique:true});
 const cuentas=createStore(db,'cuentas');idx(cuentas,'empresaId','empresaId');idx(cuentas,'codigo','codigo');idx(cuentas,'estado','estado');idx(cuentas,'empresaCodigo',['empresaId','codigo'],{unique:true});

function normalizeStudentText(value=''){return String(value).normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim().replace(/\s+/g,' ').toLowerCase()}
function studentSlug(value=''){return normalizeStudentText(value).replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,34)}
function getStudentRecents(){try{return JSON.parse(localStorage.getItem('ct_student_recents')||'[]')}catch(_){return[]}}
function saveStudentRecent(u){const rows=getStudentRecents().filter(x=>x.id!==u.id);rows.unshift({id:u.id,nombre:u.nombre,grupo:u.grupo||''});localStorage.setItem('ct_student_recents',JSON.stringify(rows.slice(0,6)))}
async function renderAuthContent(){const users=await DB.getAll('usuarios'),root=document.getElementById('authContent');if(!users.length){root.innerHTML=`<h3>Crear administrador inicial</h3><p class="smalltext muted">Esta configuración se realiza una sola vez. La contraseña será necesaria únicamente para el acceso administrativo.</p><div class="field"><label>Nombre completo</label><input id="setupName" value="Administrador"></div><div class="field" style="margin-top:10px"><label>Usuario</label><input id="setupUser" value="admin"></div><div class="field" style="margin-top:10px"><label>Contraseña segura</label><input id="setupPass" type="password" minlength="8" placeholder="Mínimo 8 caracteres"></div><button class="btn primary" style="width:100%;margin-top:15px" onclick="setupAdmin()">Crear cuenta y entrar</button>`;return}const students=users.filter(x=>x.rol==='Estudiante'&&x.estado==='ACTIVO').sort((a,b)=>a.nombre.localeCompare(b.nombre,'es')),names=[...new Set(students.map(x=>x.nombre).filter(Boolean))],groups=[...new Set(students.map(x=>x.grupo).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'es', {numeric:true})),recentIds=new Set(getStudentRecents().map(x=>x.id)),recents=students.filter(x=>recentIds.has(x.id)).sort((a,b)=>getStudentRecents().findIndex(r=>r.id===a.id)-getStudentRecents().findIndex(r=>r.id===b.id));root.innerHTML=`<div class="auth-tabs"><button id="studentTab" class="auth-tab active" onclick="switchAuthMode('student')">Estudiante</button><button id="adminTab" class="auth-tab" onclick="switchAuthMode('admin')">Docente / administrador</button></div><section id="studentAuthPane" class="auth-pane active"><h3>Ingresar al trabajo</h3><p class="smalltext muted">Seleccione un estudiante registrado o escriba el nombre y el grupo.</p>${recents.length?`<label class="smalltext"><b>Usuarios recientes en este computador</b></label><div class="recent-students">${recents.map(u=>`<button class="recent-student" onclick="selectRecentStudent('${u.id}')">${esc(u.nombre)} · ${esc(u.grupo||'Sin grupo')}</button>`).join('')}</div>`:''}<div class="field"><label>Nombre del estudiante</label><input id="studentName" list="studentNames" autocomplete="off" placeholder="Seleccione o escriba el nombre" onchange="suggestStudentGroup()"><datalist id="studentNames">${names.map(n=>`<option value="${esc(n)}"></option>`).join('')}</datalist></div><div class="field" style="margin-top:10px"><label>Grupo</label><input id="studentGroup" list="studentGroups" autocomplete="off" placeholder="Ejemplo: 8°A"><datalist id="studentGroups">${groups.map(g=>`<option value="${esc(g)}"></option>`).join('')}</datalist></div><button class="btn primary" style="width:100%;margin-top:15px" onclick="studentLogin()">Ingresar sin contraseña</button><div id="studentLoginError" class="smalltext" style="color:var(--danger);margin-top:10px"></div><div class="notice" style="margin-top:14px">Este acceso identifica al estudiante por <b>nombre + grupo</b>. No reemplaza un sistema institucional de autenticación.</div></section><section id="adminAuthPane" class="auth-pane"><h3>Acceso administrativo</h3><div class="field"><label>Usuario</label><input id="loginUser" autocomplete="username"></div><div class="field" style="margin-top:10px"><label>Contraseña</label><input id="loginPass" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"></div><button class="btn primary" style="width:100%;margin-top:15px" onclick="login()">Ingresar con contraseña</button><div id="loginError" class="smalltext" style="color:var(--danger);margin-top:10px"></div><div class="notice info" style="margin-top:14px">Configuración, usuarios, cierres y copias generales permanecen protegidos por rol y contraseña.</div></section>`}
function switchAuthMode(mode){const student=mode==='student';document.getElementById('studentTab')?.classList.toggle('active',student);document.getElementById('adminTab')?.classList.toggle('active',!student);document.getElementById('studentAuthPane')?.classList.toggle('active',student);document.getElementById('adminAuthPane')?.classList.toggle('active',!student);setTimeout(()=>document.getElementById(student?'studentName':'loginUser')?.focus(),0)}
async function selectRecentStudent(id){const u=await DB.get('usuarios',id);if(!u)return;document.getElementById('studentName').value=u.nombre||'';document.getElementById('studentGroup').value=u.grupo||''}
async function suggestStudentGroup(){const name=normalizeStudentText(document.getElementById('studentName')?.value||''),users=await DB.getAll('usuarios'),matches=users.filter(x=>x.rol==='Estudiante'&&x.estado==='ACTIVO'&&normalizeStudentText(x.nombre)===name);if(matches.length===1&&!document.getElementById('studentGroup').value)document.getElementById('studentGroup').value=matches[0].grupo||''}
async function setupAdmin(){const name=document.getElementById('setupName').value.trim(),username=document.getElementById('setupUser').value.trim().toLowerCase(),password=document.getElementById('setupPass').value;if(!name||!username||password.length<8)return toast('Complete los datos y use una contraseña de mínimo 8 caracteres');const hp=await hashPassword(password);const u={id:uid('usr'),nombre:name,username,grupo:'',rol:'Administrador',estado:'ACTIVO',passwordHash:hp.hash,passwordSalt:hp.salt,passwordIteraciones:hp.iterations,creadoEn:now()};await DB.put('usuarios',u);await audit('USUARIO_CREADO',u.id,'Administrador inicial creado',null,{username,rol:u.rol},'');app.session={user:u};sessionStorage.setItem('ct_session',u.id);await startApp();await audit('INICIO_SESION',u.id,'Inicio de sesión inicial')}
async function studentLogin(){const name=document.getElementById('studentName').value.trim().replace(/\s+/g,' '),group=document.getElementById('studentGroup').value.trim().replace(/\s+/g,' '),error=document.getElementById('studentLoginError');if(!name||!group){error.textContent='Escriba o seleccione el nombre y el grupo.';return}const users=await DB.getAll('usuarios'),nameKey=normalizeStudentText(name),groupKey=normalizeStudentText(group);let u=users.find(x=>x.rol==='Estudiante'&&x.estado==='ACTIVO'&&normalizeStudentText(x.nombre)===nameKey&&normalizeStudentText(x.grupo||'')===groupKey);if(!u){let base=`est-${studentSlug(group)}-${studentSlug(name)}`.replace(/-+/g,'-').slice(0,62)||`est-${Date.now()}`,username=base,n=2;while(users.some(x=>x.username===username))username=`${base.slice(0,56)}-${n++}`;u={id:uid('usr'),nombre:name,grupo:group,username,rol:'Estudiante',estado:'ACTIVO',accesoSinClave:true,creadoEn:now(),actualizadoEn:now()};try{await DB.put('usuarios',u)}catch(_){error.textContent='No se pudo crear el perfil. Intente nuevamente.';return}}app.session={user:u};sessionStorage.setItem('ct_session',u.id);saveStudentRecent(u);await startApp();await audit('INICIO_SESION_ESTUDIANTE',u.id,`Ingreso por nombre y grupo: ${u.grupo||''}`)}
async function login(){const username=document.getElementById('loginUser').value.trim().toLowerCase(),password=document.getElementById('loginPass').value;const users=await DB.getAll('usuarios'),u=users.find(x=>x.rol!=='Estudiante'&&x.username.toLowerCase()===username&&x.estado==='ACTIVO');if(!u||!u.passwordHash||!await verifyPassword(password,u)){document.getElementById('loginError').textContent='Usuario o contraseña incorrectos.';await audit('INICIO_SESION_FALLIDO','',`Usuario administrativo: ${username}`,'','',app.config?.empresaActivaId||'');return}app.session={user:u};sessionStorage.setItem('ct_session',u.id);await startApp();await audit('INICIO_SESION',u.id,'Sesión administrativa iniciada')}
async function restoreSession(){const id=sessionStorage.getItem('ct_session');if(!id)return false;const u=await DB.get('usuarios',id);if(!u||u.estado!=='ACTIVO')return false;app.session={user:u};return true}
async function logout(){if(app.session)await audit('CIERRE_SESION',app.session.user.id,'Sesión cerrada');sessionStorage.removeItem('ct_session');app.session=null;showAuth()}
async function startApp(){document.getElementById('authRoot').innerHTML='';document.getElementById('appRoot').style.display='grid';await loadContext();await detectLegacy();renderNavPermissions();navTo('dashboard')}
function renderNavPermissions(){document.querySelectorAll('#nav button').forEach(b=>b.style.display=can(b.dataset.view)?'flex':'none')}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window._toast);window._toast=setTimeout(()=>t.classList.remove('show'),3000)}
function updateHeader(){if(!app.config||!app.company)return;document.getElementById('institutionTop').textContent=app.config.institucion;document.getElementById('contextTop').textContent=`${app.company.nombre} · Vigencia ${app.year} · ${app.company.tipo}`;document.getElementById('userTop').textContent=app.session.user.rol==='Estudiante'&&app.session.user.grupo?`${app.session.user.nombre} · ${app.session.user.grupo} (${app.session.user.rol})`:`${app.session.user.nombre} (${app.session.user.rol})`;const open=!isYearClosed(),p=document.getElementById('periodStatus');p.textContent=open?'Vigencia activa':'Vigencia cerrada';p.style.background=open?'#e8f7ef':'#fff1f0';p.style.color=open?'#18794e':'#b42318';document.getElementById('integrityBanner').classList.toggle('show',app.integrity==='COMPROMETIDA')}
function navTo(v){if(!can(v))return toast('No tiene permiso para este módulo');app.currentView=v;document.querySelectorAll('.view').forEach(x=>x.classList.toggle('active',x.id===v));document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===v));render(v)}
function render(v=app.currentView){({dashboard:renderDashboard,companies:renderCompanies,accounts:renderAccounts,thirds:renderThirds,centers:renderCenters,vouchers:renderVouchers,operations:renderOperations,books:renderBooks,closures:renderClosures,users:renderUsers,backup:renderBackup,diagnostics:renderDiagnostics,settings:renderSettings}[v]||renderDashboard)()}
document.getElementById('nav').addEventListener('click',e=>{const b=e.target.closest('button[data-view]');if(b)navTo(b.dataset.view)});
function pageHead(title,desc,actions=''){return `<div class="page-head"><div><h2>${title}</h2><p>${desc}</p></div><div class="actions no-print">${actions}</div></div>`}
function empty(msg='No hay registros.'){return `<div class="empty">${msg}</div>`}
function badge(state){const cls={ACTIVO:'active',ABIERTO:'open',CERRADO:'closed',BORRADOR:'draft',CONFIRMADO:'posted',ANULADO:'void',PAGADO:'paid',PARCIAL:'partial',PENDIENTE:'pending',COMPROMETIDA:'void',VERIFICADA:'active'}[state]||'inactive';return `<span class="badge ${cls}">${esc(state)}</span>`}
function accountName(idOrCode){const a=app.accounts.find(x=>x.id===idOrCode||x.codigo===idOrCode);return a?.nombre||''}
function thirdName(id){const t=app.thirds.find(x=>x.id===id);return t?.nombreCompleto||t?.razonSocial||''}
function centerName(id){return app.centers.find(x=>x.id===id)?.nombre||''}
function typeObj(id){return app.types.find(x=>x.id===id)||{codigo:'',nombre:''}}
function isMonthClosed(date){return app.closures.some(c=>c.tipo==='MENSUAL'&&c.anioMes===ym(date)&&c.estado==='CERRADO')||isYearClosed()}
function isYearClosed(){return !!app.annualClosure}
async function yearClosure(){return app.annualClosure||(await DB.getAllIndex('cierres','empresaVigenciaTipo',[app.company.id,app.year,'ANUAL']))[0]||null}
function totalLineas(v){return(v.lineas||[]).reduce((a,l)=>({d:a.d+Number(l.debito||0),c:a.c+Number(l.credito||0)}),{d:0,c:0})}

async function renderDashboard(){const confirmed=await DB.countIndex('comprobantes','empresaVigenciaEstado',[app.company.id,app.year,'CONFIRMADO']),drafts=await DB.countIndex('comprobantes','empresaVigenciaEstado',[app.company.id,app.year,'BORRADOR']),tot={d:Number(app.period?.totalDebitos||0),c:Number(app.period?.totalCreditos||0)},pending=app.documents.filter(d=>d.estado==='ACTIVO'&&!d.comprobanteId).length+app.payments.filter(d=>d.estado==='ACTIVO'&&!d.comprobanteId).length;document.getElementById('dashboard').innerHTML=pageHead('Panel principal','Resumen de la empresa y vigencia activas',`<button class="btn primary" onclick="openVoucher()">+ Comprobante manual</button>`)+`<div class="grid grid-4"><div class="card metric"><div><div class="value">${confirmed}</div><div class="label">Comprobantes confirmados</div></div><div class="iconbox">▤</div></div><div class="card metric"><div><div class="value">${drafts}</div><div class="label">Borradores</div></div><div class="iconbox">✎</div></div><div class="card metric"><div><div class="value">${pending}</div><div class="label">Soportes sin comprobante</div></div><div class="iconbox">⌁</div></div><div class="card metric"><div><div class="value">${app.closures.length}/12</div><div class="label">Meses cerrados</div></div><div class="iconbox">⊠</div></div></div><div class="grid grid-2" style="margin-top:16px"><div class="card"><h3>Movimiento de la vigencia</h3><div class="split"><div><div class="muted smalltext">Débitos confirmados</div><b style="font-size:24px">${money(tot.d)}</b></div><div><div class="muted smalltext">Créditos confirmados</div><b style="font-size:24px">${money(tot.c)}</b></div></div><div class="notice ${Math.abs(tot.d-tot.c)<.01?'ok':'danger'}" style="margin-top:14px">Comprobación global: ${Math.abs(tot.d-tot.c)<.01?'partida doble equilibrada':'diferencia '+money(tot.d-tot.c)}</div></div><div class="card"><h3>Integridad y almacenamiento</h3><p>Estado de la cadena: ${badge(app.integrity)}</p><p>Almacenamiento principal: <b>IndexedDB · ${DB_NAME}</b></p><p class="smalltext muted">Las huellas detectan cambios en registros confirmados; no equivalen a firma digital certificada ni sustituyen la seguridad de una aplicación nativa.</p><button class="btn info" onclick="verifyIntegrity(true)">Verificar integridad</button></div></div>${app.migrationLegacy&&!app.config.migracionCompletada?`<div class="card" style="margin-top:16px;border-color:#f7d993"><h3>Asistente de migración disponible</h3><p>Se encontraron datos de una versión anterior en localStorage. Se descargará una copia previa y después se copiarán los registros a IndexedDB sin borrar el origen.</p><button class="btn primary" onclick="prepareMigration()">Crear respaldo cifrado y migrar</button></div>`:''}<div class="card" style="margin-top:16px"><h3>Enfoque pedagógico</h3><div class="notice info">ContaTécnica no crea asientos, no sugiere cuentas y no calcula impuestos ni valores contables. El estudiante selecciona manualmente cuentas, terceros, centros de costo, débitos y créditos. El sistema solo valida estructura, fechas, cierres, consecutivos, integridad y partida doble.</div></div>`}

function renderCompanies(){document.getElementById('companies').innerHTML=pageHead('Empresas','Empresas reales o simuladas separadas dentro de la misma instalación',canAdmin()?'<button class="btn primary" onclick="openCompany()">+ Empresa</button>':'')+`<div class="card"><div class="table-wrap"><table><thead><tr><th>Empresa</th><th>NIT</th><th>Tipo</th><th>Moneda</th><th>Estado</th><th></th></tr></thead><tbody>${app.companies.map(e=>`<tr><td><b>${esc(e.nombre)}</b>${e.id===app.company.id?'<div class="smalltext" style="color:var(--ok)">Empresa activa</div>':''}</td><td>${esc(e.nit||'—')}</td><td>${esc(e.tipo)}</td><td>${esc(e.moneda)}</td><td>${badge(e.estado)}</td><td class="right">${canAdmin()?`<button class="btn small" onclick="activateCompany('${e.id}')">Activar</button> <button class="btn small" onclick="openCompany('${e.id}')">Editar</button>`:''}</td></tr>`).join('')}</tbody></table></div></div>`}
function openCompany(id=''){if(!canAdmin())return toast('Solo el administrador puede modificar empresas');const e=app.companies.find(x=>x.id===id)||{nombre:'',nit:'',tipo:'Empresa simulada',moneda:'COP',estado:'ACTIVO'};showModal(id?'Editar empresa':'Nueva empresa',`<div class="form-grid"><div class="field span-8"><label>Nombre</label><input id="coName" value="${esc(e.nombre)}"></div><div class="field span-4"><label>NIT</label><input id="coNit" value="${esc(e.nit)}"></div><div class="field span-4"><label>Tipo</label><select id="coType"><option ${e.tipo==='Empresa simulada'?'selected':''}>Empresa simulada</option><option ${e.tipo==='Empresa institucional'?'selected':''}>Empresa institucional</option></select></div><div class="field span-4"><label>Moneda</label><select id="coMoney"><option>COP</option><option>USD</option></select></div><div class="field span-4"><label>Estado</label><select id="coState"><option>ACTIVO</option><option ${e.estado==='INACTIVO'?'selected':''}>INACTIVO</option></select></div></div>`,async()=>{const name=val('coName');if(!name)return toast('Digite el nombre');const n={...e,id:e.id||uid('emp'),nombre:name,nit:val('coNit'),tipo:val('coType'),moneda:val('coMoney'),estado:val('coState'),actualizadoEn:now(),creadoEn:e.creadoEn||now()};await DB.put('empresas',n);await audit(id?'EMPRESA_MODIFICADA':'EMPRESA_CREADA',n.id,n.nombre,e,n,n.id);if(!id){await DB.put('periodos',{id:`${n.id}_${app.year}`,empresaId:n.id,vigencia:app.year,estado:'ABIERTO',cantidadConfirmados:0,totalDebitos:0,totalCreditos:0,creadoEn:now()});for(let i=0;i<seedAccounts.length;i++){const a=seedAccounts[i];await DB.put('cuentas',{id:`${n.id}_acc_${i}`,empresaId:n.id,codigo:a[0],nombre:a[1],nivel:a[2],naturaleza:a[3],estado:'ACTIVO',creadoEn:now()})}for(let i=0;i<seedTypes.length;i++)await DB.put('tiposComprobante',{id:`${n.id}_tc_${i}`,empresaId:n.id,codigo:seedTypes[i][0],nombre:seedTypes[i][1],estado:'ACTIVO',creadoEn:now()})}closeModal();await loadContext();renderCompanies();toast('Empresa guardada')})}
async function activateCompany(id){app.config.empresaActivaId=id;await DB.put('configuracion',app.config);await audit('EMPRESA_ACTIVADA',id,'Cambio de empresa activa');app.voucherPage=1;await loadContext();render(app.currentView);toast('Empresa activa actualizada')}

function renderAccounts(){const q=(document.getElementById('accountSearch')?.value||'').toLowerCase(),rows=app.accounts.filter(a=>(a.codigo+' '+a.nombre).toLowerCase().includes(q)).sort((a,b)=>a.codigo.localeCompare(b.codigo,undefined,{numeric:true}));document.getElementById('accounts').innerHTML=pageHead('Plan de cuentas','La selección muestra código, nombre y naturaleza, pero no decide el asiento',canManageMasters()?'<button class="btn primary" onclick="openAccount()">+ Cuenta</button><button class="btn" onclick="exportAccounts()">Excel</button>':'<button class="btn" onclick="exportAccounts()">Excel</button>')+`<div class="card"><div class="toolbar"><input id="accountSearch" class="search" placeholder="Buscar código o nombre" value="${esc(q)}" oninput="renderAccounts()"></div><div class="table-wrap"><table><thead><tr><th>Código</th><th>Nombre</th><th>Nivel</th><th>Naturaleza</th><th>Estado</th><th></th></tr></thead><tbody>${rows.map(a=>`<tr><td><b>${esc(a.codigo)}</b></td><td>${esc(a.nombre)}</td><td>${esc(a.nivel)}</td><td>${a.naturaleza==='D'?'Débito':'Crédito'}</td><td>${badge(a.estado)}</td><td class="right">${canManageMasters()?`<button class="btn small" onclick="openAccount('${a.id}')">Editar</button>`:''}</td></tr>`).join('')}</tbody></table></div></div>`}
function openAccount(id=''){if(!canManageMasters())return toast('Solo administrador o docente pueden modificar el plan de cuentas');const a=app.accounts.find(x=>x.id===id)||{codigo:'',nombre:'',nivel:'Auxiliar',naturaleza:'D',estado:'ACTIVO'};showModal(id?'Editar cuenta':'Nueva cuenta',`<div class="form-grid"><div class="field span-3"><label>Código</label><input id="acCode" value="${esc(a.codigo)}" ${id?'readonly':''}></div><div class="field span-6"><label>Nombre</label><input id="acName" value="${esc(a.nombre)}"></div><div class="field span-3"><label>Nivel</label><select id="acLevel">${['Grupo','Cuenta','Subcuenta','Auxiliar'].map(x=>`<option ${a.nivel===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field span-4"><label>Naturaleza</label><select id="acNature"><option value="D" ${a.naturaleza==='D'?'selected':''}>Débito</option><option value="C" ${a.naturaleza==='C'?'selected':''}>Crédito</option></select></div><div class="field span-4"><label>Estado</label><select id="acState"><option>ACTIVO</option><option ${a.estado==='INACTIVO'?'selected':''}>INACTIVO</option></select></div></div>`,async()=>{const code=val('acCode'),name=val('acName');if(!code||!name)return toast('Código y nombre son obligatorios');const n={...a,id:a.id||uid('acc'),empresaId:app.company.id,codigo:code,nombre:name,nivel:val('acLevel'),naturaleza:val('acNature'),estado:val('acState'),actualizadoEn:now(),creadoEn:a.creadoEn||now()};try{await DB.put('cuentas',n)}catch(e){return toast('El código ya existe en esta empresa')}await audit(id?'CUENTA_MODIFICADA':'CUENTA_CREADA',n.id,`${n.codigo} ${n.nombre}`,a,n);closeModal();await loadContext();renderAccounts();toast('Cuenta guardada')})}

function renderThirds(){const q=(document.getElementById('thirdSearch')?.value||'').toLowerCase(),rows=app.thirds.filter(t=>(t.numeroIdentificacion+' '+(t.nombreCompleto||t.razonSocial)).toLowerCase().includes(q));document.getElementById('thirds').innerHTML=pageHead('Terceros','Datos estructurales sin consultas ni transmisión a la DIAN',canManageMasters()?'<button class="btn primary" onclick="openThird()">+ Tercero</button><button class="btn" onclick="exportThirds()">Excel</button>':'<button class="btn" onclick="exportThirds()">Excel</button>')+`<div class="card"><div class="toolbar"><input id="thirdSearch" class="search" placeholder="Buscar identificación o nombre" value="${esc(q)}" oninput="renderThirds()"></div>${rows.length?`<div class="table-wrap"><table><thead><tr><th>Identificación</th><th>Nombre / razón social</th><th>Tipo</th><th>Municipio</th><th>Contacto</th><th>Estado</th><th></th></tr></thead><tbody>${rows.map(t=>`<tr><td>${esc(t.tipoDocumento)} ${esc(t.numeroIdentificacion)}${t.digitoVerificacion?'-'+esc(t.digitoVerificacion):''}</td><td><b>${esc(t.nombreCompleto||t.razonSocial)}</b></td><td>${esc(t.tipoPersona)}</td><td>${esc(t.municipio||'—')}</td><td>${esc(t.telefono||'')}<br><span class="smalltext">${esc(t.correo||'')}</span></td><td>${badge(t.estado)}</td><td class="right">${canManageMasters()?`<button class="btn small" onclick="openThird('${t.id}')">Editar</button>`:''}</td></tr>`).join('')}</tbody></table></div>`:empty()}</div>`}
function openThird(id=''){if(!canManageMasters())return toast('Solo administrador o docente pueden modificar terceros');const t=app.thirds.find(x=>x.id===id)||{tipoPersona:'NATURAL',tipoDocumento:'CC',numeroIdentificacion:'',digitoVerificacion:'',primerApellido:'',segundoApellido:'',primerNombre:'',otrosNombres:'',razonSocial:'',direccion:'',departamento:'Sucre',municipio:'San Pedro',codigoMunicipio:'',pais:'Colombia',telefono:'',correo:'',responsabilidadesTributarias:'',estado:'ACTIVO'};showModal(id?'Editar tercero':'Nuevo tercero',`<div class="form-grid"><div class="field span-3"><label>Tipo de persona</label><select id="thPerson" onchange="toggleThirdPerson()"><option value="NATURAL" ${t.tipoPersona==='NATURAL'?'selected':''}>Natural</option><option value="JURIDICA" ${t.tipoPersona==='JURIDICA'?'selected':''}>Jurídica</option></select></div><div class="field span-3"><label>Tipo de documento</label><select id="thDocType">${['CC','NIT','CE','TI','PASAPORTE','OTRO'].map(x=>`<option ${t.tipoDocumento===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field span-4"><label>Número de identificación</label><input id="thDoc" value="${esc(t.numeroIdentificacion)}" ${id?'readonly':''}></div><div class="field span-2"><label>Dígito de verificación</label><input id="thDv" maxlength="1" value="${esc(t.digitoVerificacion)}"></div><div class="field span-3 natural"><label>Primer apellido</label><input id="thLast1" value="${esc(t.primerApellido)}"></div><div class="field span-3 natural"><label>Segundo apellido</label><input id="thLast2" value="${esc(t.segundoApellido)}"></div><div class="field span-3 natural"><label>Primer nombre</label><input id="thFirst" value="${esc(t.primerNombre)}"></div><div class="field span-3 natural"><label>Otros nombres</label><input id="thOther" value="${esc(t.otrosNombres)}"></div><div class="field span-12 juridica"><label>Razón social</label><input id="thBusiness" value="${esc(t.razonSocial)}"></div><div class="field span-6"><label>Dirección</label><input id="thAddress" value="${esc(t.direccion)}"></div><div class="field span-3"><label>Departamento</label><input id="thDepartment" value="${esc(t.departamento)}"></div><div class="field span-3"><label>Municipio</label><input id="thCity" value="${esc(t.municipio)}"></div><div class="field span-3"><label>Código municipio</label><input id="thCityCode" value="${esc(t.codigoMunicipio)}"></div><div class="field span-3"><label>País</label><input id="thCountry" value="${esc(t.pais)}"></div><div class="field span-3"><label>Teléfono</label><input id="thPhone" value="${esc(t.telefono)}"></div><div class="field span-3"><label>Correo</label><input id="thEmail" type="email" value="${esc(t.correo)}"></div><div class="field span-9"><label>Responsabilidades tributarias (texto descriptivo)</label><input id="thTax" value="${esc(t.responsabilidadesTributarias)}"></div><div class="field span-3"><label>Estado</label><select id="thState"><option>ACTIVO</option><option ${t.estado==='INACTIVO'?'selected':''}>INACTIVO</option></select></div></div>`,async()=>{const person=val('thPerson'),doc=val('thDoc'),business=val('thBusiness'),full=[val('thFirst'),val('thOther'),val('thLast1'),val('thLast2')].filter(Boolean).join(' ');if(!doc||person==='NATURAL'&&!full||person==='JURIDICA'&&!business)return toast('Complete identificación y nombre o razón social');const n={...t,id:t.id||uid('ter'),empresaId:app.company.id,tipoPersona:person,tipoDocumento:val('thDocType'),numeroIdentificacion:doc,digitoVerificacion:val('thDv'),primerApellido:val('thLast1'),segundoApellido:val('thLast2'),primerNombre:val('thFirst'),otrosNombres:val('thOther'),razonSocial:business,nombreCompleto:person==='NATURAL'?full:business,direccion:val('thAddress'),departamento:val('thDepartment'),municipio:val('thCity'),codigoMunicipio:val('thCityCode'),pais:val('thCountry'),telefono:val('thPhone'),correo:val('thEmail'),responsabilidadesTributarias:val('thTax'),estado:val('thState'),actualizadoEn:now(),creadoEn:t.creadoEn||now()};try{await DB.put('terceros',n)}catch(e){return toast('La identificación ya existe en esta empresa')}await audit(id?'TERCERO_MODIFICADO':'TERCERO_CREADO',n.id,n.nombreCompleto,t,n);closeModal();await loadContext();renderThirds();toast('Tercero guardado')});setTimeout(toggleThirdPerson,0)}
function toggleThirdPerson(){const natural=val('thPerson')==='NATURAL';document.querySelectorAll('.natural').forEach(x=>x.style.display=natural?'grid':'none');document.querySelectorAll('.juridica').forEach(x=>x.style.display=natural?'none':'grid')}

function renderCenters(){document.getElementById('centers').innerHTML=pageHead('Centros de costo','Clasifique manualmente cada línea por área, proyecto o dependencia',canManageMasters()?'<button class="btn primary" onclick="openCenter()">+ Centro</button>':'')+`<div class="notice info" style="margin-bottom:14px">El centro de costo no reemplaza la cuenta contable. El estudiante selecciona tanto la cuenta como el centro en cada línea del comprobante.</div><div class="card"><div class="table-wrap"><table><thead><tr><th>Código</th><th>Nombre</th><th>Responsable</th><th>Estado</th><th></th></tr></thead><tbody>${app.centers.sort((a,b)=>a.codigo.localeCompare(b.codigo)).map(c=>`<tr><td><b>${esc(c.codigo)}</b></td><td>${esc(c.nombre)}</td><td>${esc(c.responsable||'—')}</td><td>${badge(c.estado)}</td><td class="right">${canManageMasters()?`<button class="btn small" onclick="openCenter('${c.id}')">Editar</button>`:''}</td></tr>`).join('')}</tbody></table></div></div>`}
function openCenter(id=''){if(!canManageMasters())return toast('Solo administrador o docente pueden modificar centros de costo');const c=app.centers.find(x=>x.id===id)||{codigo:'',nombre:'',responsable:'',estado:'ACTIVO'};showModal(id?'Editar centro':'Nuevo centro de costo',`<div class="form-grid"><div class="field span-3"><label>Código</label><input id="ccCode" value="${esc(c.codigo)}" ${id?'readonly':''}></div><div class="field span-5"><label>Nombre</label><input id="ccName" value="${esc(c.nombre)}"></div><div class="field span-4"><label>Responsable</label><input id="ccResp" value="${esc(c.responsable)}"></div><div class="field span-4"><label>Estado</label><select id="ccState"><option>ACTIVO</option><option ${c.estado==='INACTIVO'?'selected':''}>INACTIVO</option></select></div></div>`,async()=>{const n={...c,id:c.id||uid('cc'),empresaId:app.company.id,codigo:val('ccCode'),nombre:val('ccName'),responsable:val('ccResp'),estado:val('ccState'),actualizadoEn:now(),creadoEn:c.creadoEn||now()};if(!n.codigo||!n.nombre)return toast('Código y nombre son obligatorios');try{await DB.put('centrosCostos',n)}catch(e){return toast('El código ya existe')}await audit(id?'CENTRO_COSTO_MODIFICADO':'CENTRO_COSTO_CREADO',n.id,n.nombre,c,n);closeModal();await loadContext();renderCenters();toast('Centro guardado')})}

function accountOptions(selected=''){return `<option value="">Seleccione una cuenta</option>`+app.accounts.filter(a=>a.estado==='ACTIVO'&&a.nivel==='Auxiliar').sort((a,b)=>a.codigo.localeCompare(b.codigo,undefined,{numeric:true})).map(a=>`<option value="${a.id}" ${a.id===selected?'selected':''}>${esc(a.codigo)} · ${esc(a.nombre)}</option>`).join('')}
function thirdOptions(selected=''){return `<option value="">Sin tercero</option>`+app.thirds.filter(t=>t.estado==='ACTIVO').map(t=>`<option value="${t.id}" ${t.id===selected?'selected':''}>${esc(t.numeroIdentificacion)} · ${esc(t.nombreCompleto||t.razonSocial)}</option>`).join('')}
function centerOptions(selected=''){return `<option value="">Sin centro</option>`+app.centers.filter(c=>c.estado==='ACTIVO').map(c=>`<option value="${c.id}" ${c.id===selected?'selected':''}>${esc(c.codigo)} · ${esc(c.nombre)}</option>`).join('')}
function typeOptions(selected=''){return `<option value="">Seleccione el tipo</option>`+app.types.filter(t=>t.estado==='ACTIVO').map(t=>`<option value="${t.id}" ${t.id===selected?'selected':''}>${esc(t.codigo)} · ${esc(t.nombre)}</option>`).join('')}
function sourceOptions(selectedDoc='',selectedPayment=''){let o='<option value="">Sin soporte vinculado</option>';for(const d of app.documents.filter(x=>x.estado==='ACTIVO'))o+=`<option value="D:${d.id}" ${d.id===selectedDoc?'selected':''}>Documento ${esc(d.numero)} · ${esc(d.subtipo)} · ${money(d.total)}</option>`;for(const p of app.payments.filter(x=>x.estado==='ACTIVO'))o+=`<option value="A:${p.id}" ${p.id===selectedPayment?'selected':''}>Abono ${esc(p.referencia)} · ${money(p.valor)}</option>`;return o}
function sourceSummary(v){const d=v.documentoSoporteId?app.documents.find(x=>x.id===v.documentoSoporteId):null,p=v.abonoId?app.payments.find(x=>x.id===v.abonoId):null,s=d||p;if(!s)return '<div class="source-card muted">Sin documento soporte vinculado. El comprobante se elabora manualmente.</div>';return `<div class="source-card"><strong>${d?'Documento '+esc(d.numero):'Abono '+esc(p.referencia)}</strong><div class="smalltext">Fecha: ${esc(s.fecha)} · Valor documental: <b>${money(d?d.total:p.valor)}</b></div><div class="notice info" style="margin-top:8px">El valor del soporte no se traslada al comprobante. Debe seleccionar manualmente cuentas y valores.</div></div>`}
async function renderVouchers(){await loadVoucherPage();const pages=Math.max(1,Math.ceil(app.voucherTotal/app.voucherPageSize));document.getElementById('vouchers').innerHTML=pageHead('Comprobantes','Digitación manual con consecutivos definitivos solo al confirmar',canWrite()?'<button class="btn primary" onclick="openVoucher()">+ Nuevo comprobante</button><button class="btn" onclick="printCurrent()">Imprimir / PDF</button>':'<button class="btn" onclick="printCurrent()">Imprimir / PDF</button>')+`<div class="notice info" style="margin-bottom:14px">Los borradores usan un identificador temporal y no consumen consecutivo. Al confirmar, el número se asigna por empresa, tipo y año en formato <b>TIPO-AÑO-000001</b>.</div><div class="card"><div class="toolbar"><select id="voucherFilter" onchange="changeVoucherFilter(this.value)"><option value="ALL">Todos</option><option value="BORRADOR" ${app.voucherFilter==='BORRADOR'?'selected':''}>Borradores</option><option value="CONFIRMADO" ${app.voucherFilter==='CONFIRMADO'?'selected':''}>Confirmados</option><option value="ANULADO" ${app.voucherFilter==='ANULADO'?'selected':''}>Anulados</option></select><span class="smalltext muted">${app.voucherTotal} registros</span></div>${app.vouchers.length?`<div class="table-wrap"><table><thead><tr><th>Número</th><th>Fecha</th><th>Tipo</th><th>Concepto</th><th>Estado</th><th class="num">Total</th><th></th></tr></thead><tbody>${app.vouchers.map(v=>{const t=totalLineas(v);return `<tr><td><b>${esc(v.numero||v.numeroBorrador)}</b></td><td>${esc(v.fecha)}</td><td>${esc(typeObj(v.tipoComprobanteId).codigo)}</td><td>${esc(v.concepto)}</td><td>${badge(v.estado)}</td><td class="num">${money(t.d)}</td><td><div class="row-actions"><button class="btn small" onclick="openVoucher('${v.id}')">Ver</button>${v.estado==='CONFIRMADO'&&canWrite()?`<button class="btn danger small" onclick="annulVoucher('${v.id}')">Anular</button>`:''}</div></td></tr>`}).join('')}</tbody></table></div>`:empty()}<div class="pagination"><button class="btn small" ${app.voucherPage<=1?'disabled':''} onclick="voucherPage(-1)">Anterior</button><span>Página ${app.voucherPage} de ${pages}</span><button class="btn small" ${app.voucherPage>=pages?'disabled':''} onclick="voucherPage(1)">Siguiente</button></div></div>`}
async function changeVoucherFilter(v){app.voucherFilter=v;app.voucherPage=1;await renderVouchers()}
async function voucherPage(d){app.voucherPage=Math.max(1,app.voucherPage+d);await renderVouchers()}
function blankLine(){return{id:uid('lin'),cuentaId:'',codigoCuenta:'',terceroId:'',centroCostoId:'',detalle:'',debito:0,credito:0}}

function voucherForm(v,locked){return `<div class="form-grid"><div class="field span-3"><label>Número</label><input value="${esc(v.numero||v.numeroBorrador||'Se asignará al guardar/confirmar')}" readonly></div><div class="field span-3"><label>Fecha</label><input id="vDate" type="date" value="${esc(v.fecha)}" ${locked?'disabled':''}></div><div class="field span-3"><label>Tipo de comprobante</label><select id="vType" ${locked?'disabled':''}>${typeOptions(v.tipoComprobanteId)}</select></div><div class="field span-3"><label>Estado</label><input value="${esc(v.estado)}" readonly></div><div class="field span-8"><label>Concepto general</label><input id="vConcept" value="${esc(v.concepto)}" ${locked?'readonly':''}></div><div class="field span-4"><label>Tercero principal</label><select id="vThird" ${locked?'disabled':''}>${thirdOptions(v.terceroId)}</select></div><div class="field span-12"><label>Documento soporte</label><select id="vSource" onchange="sourceChange(this.value)" ${locked?'disabled':''}>${sourceOptions(v.documentoSoporteId,v.abonoId)}</select></div></div><div id="sourceSummary">${sourceSummary(v)}</div><hr style="border:0;border-top:1px solid var(--border);margin:18px 0"><div class="toolbar"><div><strong>Detalle manual</strong><div class="smalltext muted">Seleccione cuenta, tercero, centro y valor. La cuenta muestra código, nombre y naturaleza como identificación, no como respuesta.</div></div>${locked?'':`<button class="btn small" onclick="addVoucherLine()">+ Línea</button>`}</div><div id="voucherLines">${v.lineas.map((l,i)=>voucherLine(l,i,locked)).join('')}</div><div class="totals"><span>Débitos: <b id="vDebit">$0</b></span><span>Créditos: <b id="vCredit">$0</b></span><span id="vDiff"></span></div>${locked&&v.huella?`<div class="notice"><b>Huella SHA-256:</b><div class="hash">${esc(v.huella)}</div><b>Huella anterior:</b><div class="hash">${esc(v.hashAnterior||'INICIO')}</div></div>`:''}`}
function voucherLine(l,i,locked){const a=app.accounts.find(x=>x.id===l.cuentaId);return `<div class="line-editor" data-index="${i}"><div class="field wide"><label>Cuenta</label><select onchange="lineAccount(${i},this.value)" ${locked?'disabled':''}>${accountOptions(l.cuentaId)}</select><div class="account-preview" id="accPrev${i}">${a?`${esc(a.codigo)} · ${esc(a.nombre)} · Naturaleza ${a.naturaleza==='D'?'débito':'crédito'}`:'Seleccione una cuenta'}</div></div><div class="field"><label>Tercero</label><select onchange="lineSet(${i},'terceroId',this.value)" ${locked?'disabled':''}>${thirdOptions(l.terceroId)}</select></div><div class="field"><label>Centro de costo</label><select onchange="lineSet(${i},'centroCostoId',this.value)" ${locked?'disabled':''}>${centerOptions(l.centroCostoId)}</select></div><div class="field wide"><label>Detalle</label><input value="${esc(l.detalle)}" oninput="lineSet(${i},'detalle',this.value)" ${locked?'readonly':''}></div><div class="field"><label>Débito</label><input type="number" min="0" step="0.01" value="${Number(l.debito||0)}" oninput="lineAmount(${i},'debito',this.value)" ${locked?'readonly':''}></div><div class="field"><label>Crédito</label><input type="number" min="0" step="0.01" value="${Number(l.credito||0)}" oninput="lineAmount(${i},'credito',this.value)" ${locked?'readonly':''}></div>${locked?'<div></div>':`<button class="btn danger small" onclick="removeVoucherLine(${i})">×</button>`}</div>`}
function sourceChange(x){const [k,id]=(x||':').split(':');voucherDraft.documentoSoporteId=k==='D'?id:'';voucherDraft.abonoId=k==='A'?id:'';document.getElementById('sourceSummary').innerHTML=sourceSummary(voucherDraft)}
function lineAccount(i,id){const a=app.accounts.find(x=>x.id===id);voucherDraft.lineas[i].cuentaId=id;voucherDraft.lineas[i].codigoCuenta=a?.codigo||'';document.getElementById(`accPrev${i}`).textContent=a?`${a.codigo} · ${a.nombre} · Naturaleza ${a.naturaleza==='D'?'débito':'crédito'}`:'Seleccione una cuenta'}
function lineSet(i,k,v){voucherDraft.lineas[i][k]=v}
function lineAmount(i,k,v){voucherDraft.lineas[i][k]=Math.max(0,Number(v||0));updateVoucherTotals()}
function addVoucherLine(){voucherDraft.lineas.push(blankLine());refreshVoucherLines()}
function removeVoucherLine(i){if(voucherDraft.lineas.length<=2)return toast('Se requieren al menos dos líneas');voucherDraft.lineas.splice(i,1);refreshVoucherLines()}
function refreshVoucherLines(){document.getElementById('voucherLines').innerHTML=voucherDraft.lineas.map((l,i)=>voucherLine(l,i,false)).join('');updateVoucherTotals()}
function updateVoucherTotals(){const t=totalLineas(voucherDraft),el=document.getElementById('vDiff');if(!el)return;document.getElementById('vDebit').textContent=money(t.d);document.getElementById('vCredit').textContent=money(t.c);el.textContent=t.d>0&&Math.abs(t.d-t.c)<.01?'Partida doble cuadrada':t.d||t.c?'Partida doble no cuadrada':'Sin movimientos';el.className=t.d>0&&Math.abs(t.d-t.c)<.01?'balanced':'unbalanced'}
function readVoucherForm(){voucherDraft.fecha=val('vDate');voucherDraft.tipoComprobanteId=val('vType');voucherDraft.concepto=val('vConcept');voucherDraft.terceroId=val('vThird');voucherDraft.vigencia=yearOf(voucherDraft.fecha);voucherDraft.anioMes=ym(voucherDraft.fecha);voucherDraft.empresaId=app.company.id;voucherDraft.lineas=voucherDraft.lineas.filter(l=>l.cuentaId||l.debito||l.credito||l.detalle||l.terceroId||l.centroCostoId)}
function validateVoucher(v,confirming=false){if(!v.fecha||!v.tipoComprobanteId||!v.concepto)return'Fecha, tipo y concepto son obligatorios';if(yearOf(v.fecha)!==app.year)return`La fecha debe pertenecer a la vigencia ${app.year}`;if(isMonthClosed(v.fecha))return'El mes está cerrado';if(!confirming)return'';if(v.lineas.length<2)return'Se requieren al menos dos líneas';for(const l of v.lineas){if(!l.cuentaId)return'Todas las líneas deben tener cuenta';if((l.debito>0&&l.credito>0)||(!l.debito&&!l.credito))return'Cada línea debe tener únicamente débito o crédito';if(l.debito<0||l.credito<0)return'No se permiten valores negativos'}const t=totalLineas(v);if(t.d<=0||Math.abs(t.d-t.c)>=.01)return'La partida doble no está cuadrada';return''}
async function saveDraft(){if(!canWrite())return toast('Modo de consulta');readVoucherForm();const err=validateVoucher(voucherDraft,false);if(err)return toast(err);const before=voucherDraft.id?await DB.get('comprobantes',voucherDraft.id):null;if(before&&before.estado!=='BORRADOR')return toast('Un comprobante confirmado no puede editarse');voucherDraft.id=voucherDraft.id||uid('cmp');voucherDraft.numeroBorrador=voucherDraft.numeroBorrador||`BOR-${app.year}-${voucherDraft.id.slice(-6).toUpperCase()}`;if(!voucherDraft.numero)delete voucherDraft.numero;voucherDraft.estado='BORRADOR';voucherDraft.creadoEn=voucherDraft.creadoEn||now();voucherDraft.creadoPor=voucherDraft.creadoPor||app.session.user.id;voucherDraft.actualizadoEn=now();voucherDraft.actualizadoPor=app.session.user.id;await DB.put('comprobantes',voucherDraft);await audit(before?'BORRADOR_MODIFICADO':'BORRADOR_CREADO',voucherDraft.id,voucherDraft.numeroBorrador,before,voucherDraft);closeModal();await renderVouchers();toast('Borrador guardado')}
