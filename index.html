<!doctype html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#8f1d2c"><title>ContaTécnica · Fase 3</title><style>body{font-family:Arial,sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:#f4f6f8;color:#68111d}main{text-align:center;padding:2rem}.spinner{width:44px;height:44px;border:5px solid #dbc9cc;border-top-color:#8f1d2c;border-radius:50%;animation:s 1s linear infinite;margin:auto}@keyframes s{to{transform:rotate(360deg)}}</style></head><body><main><div class="spinner"></div><h1>ContaTécnica</h1><p>Cargando Fase 3…</p></main><script>
(async()=>{try{if(typeof DecompressionStream==='undefined')throw new Error('Actualice Chrome o Edge para abrir la aplicación.');const paths=['./app/fase3-01.dat','./app/fase3-02.dat','./app/fase3-03.dat','./app/fase3-04.dat'];let text='';for(const path of paths){const r=await fetch(path,{cache:'no-store'});if(!r.ok)throw new Error(`No se pudo cargar ${path} (${r.status})`);text+=(await r.text()).trim()}const raw=atob(text),bytes=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);const html=await new Response(new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'))).text();document.open();document.write(html);document.close()}catch(e){document.body.innerHTML=`<main><h1>No se pudo iniciar ContaTécnica</h1><p>${String(e.message||e)}</p><p>Recargue la página en Chrome o Edge.</p></main>`;console.error(e)}})();
</script></body></html>
