async function buildReport(tab){const rows=await reportRows(),trial=await trialData();if(tab==='journal')return reportHeader('Libro diario')+tableHtml(['Fecha','Comprobante','Cuenta','Concepto / detalle','Tercero','Centro','Débito','Crédito'],rows.map(r=>[r.fecha,r.numero,`${r.codigo} · ${r.nombre}`,r.detalle||r.concepto,r.tercero||'—',r.centro||'—',money(r.debito),money(r.credito)]),[6,7]);if(tab==='ledger'||tab==='accountsAux')return reportHeader(tab==='ledger'?'Libro mayor':'Auxiliar por cuenta')+tableHtml(['Cuenta','Fecha','Comprobante','Detalle','Débito','Crédito'],rows.sort((a,b)=>(a.codigo+a.fecha).localeCompare(b.codigo+b.fecha)).map(r=>[`${r.codigo} · ${r.nombre}`,r.fecha,r.numero,r.detalle||r.concepto,money(r.debito),money(r.credito)]),[4,5]);if(tab==='trial')return reportHeader('Balance de prueba')+tableHtml(['Código','Cuenta','Movimiento débito','Movimiento crédito','Saldo débito','Saldo crédito'],trial.map(x=>[x.codigo,x.nombre,money(x.debito),money(x.credito),money(x.saldoDebito),money(x.saldoCredito)]),[2,3,4,5])+mathCheck(trial.reduce((s,x)=>s+x.debito,0),trial.reduce((s,x)=>s+x.credito,0));if(tab==='position')return await financialPosition(trial);if(tab==='income')return await incomeStatement(trial);if(tab==='compare')return await comparativeReport();if(tab==='thirdsAux'||tab==='centersAux')return groupedReport(rows,tab==='thirdsAux'?'third':'center');if(tab==='audit')return await auditReport();return empty()}
function tableHtml(headers,rows,numCols=[]){return rows.length?`<div class="table-wrap"><table><thead><tr>${headers.map((h,i)=>`<th class="${numCols.includes(i)?'num':''}">${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map((v,i)=>`<td class="${numCols.includes(i)?'num':''}">${esc(v)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`:empty('No existen movimientos confirmados para este informe.')}
function mathCheck(d,c){return `<div class="notice ${Math.abs(d-c)<.01?'ok':'danger'}" style="margin-top:12px">Comprobación matemática: débitos ${money(d)} · créditos ${money(c)} · diferencia ${money(d-c)}</div>`}
async function financialPosition(trial){const groups={Activo:[],Pasivo:[],Patrimonio:[]};for(const x of trial){const c=x.codigo[0],balance=x.debito-x.credito;if(c==='1')groups.Activo.push({...x,value:balance});if(c==='2')groups.Pasivo.push({...x,value:-balance});if(c==='3')groups.Patrimonio.push({...x,value:-balance})}const total=k=>groups[k].reduce((s,x)=>s+x.value,0);return reportHeader('Estado de situación financiera')+Object.entries(groups).map(([k,a])=>`<h3>${k}</h3>${tableHtml(['Código','Cuenta','Saldo'],a.map(x=>[x.codigo,x.nombre,money(x.value)]),[2])}<div class="right"><b>Total ${k}: ${money(total(k))}</b></div>`).join('')+`<div class="notice ${Math.abs(total('Activo')-total('Pasivo')-total('Patrimonio'))<.01?'ok':'danger'}" style="margin-top:15px">Activo ${money(total('Activo'))} = Pasivo ${money(total('Pasivo'))} + Patrimonio ${money(total('Patrimonio'))}. Diferencia: ${money(total('Activo')-total('Pasivo')-total('Patrimonio'))}</div><p class="smalltext muted">No se realizaron ajustes ni reclasificaciones automáticas.</p>`}
async function incomeStatement(trial){const inc=trial.filter(x=>x.codigo[0]==='4').map(x=>({...x,value:x.credito-x.debito})),exp=trial.filter(x=>['5','6'].includes(x.codigo[0])).map(x=>({...x,value:x.debito-x.credito})),ti=inc.reduce((s,x)=>s+x.value,0),te=exp.reduce((s,x)=>s+x.value,0);return reportHeader('Estado de resultados')+`<h3>Ingresos</h3>${tableHtml(['Código','Cuenta','Valor'],inc.map(x=>[x.codigo,x.nombre,money(x.value)]),[2])}<div class="right"><b>Total ingresos: ${money(ti)}</b></div><h3>Gastos y costos</h3>${tableHtml(['Código','Cuenta','Valor'],exp.map(x=>[x.codigo,x.nombre,money(x.value)]),[2])}<div class="right"><b>Total gastos y costos: ${money(te)}</b></div><div class="notice ${ti-te>=0?'ok':'danger'}" style="margin-top:15px"><b>Resultado del ejercicio: ${money(ti-te)}</b></div><p class="smalltext muted">El resultado se obtiene de los saldos registrados; no se elaboran ajustes ni asientos de cierre automáticos.</p>`}
async function comparativeReport(){const y2=app.year-1,t1=await trialData(app.year),t2=await trialData(y2),map=new Map;t1.forEach(x=>map.set(x.codigo,{codigo:x.codigo,nombre:x.nombre,actual:x.saldoDebito-x.saldoCredito,anterior:0}));t2.forEach(x=>{const a=map.get(x.codigo)||{codigo:x.codigo,nombre:x.nombre,actual:0,anterior:0};a.anterior=x.saldoDebito-x.saldoCredito;map.set(x.codigo,a)});const rows=[...map.values()].sort((a,b)=>a.codigo.localeCompare(b.codigo,undefined,{numeric:true}));return reportHeader(`Comparativo ${app.year} frente a ${y2}`)+tableHtml(['Código','Cuenta',String(y2),String(app.year),'Variación'],rows.map(x=>[x.codigo,x.nombre,money(x.anterior),money(x.actual),money(x.actual-x.anterior)]),[2,3,4])}
function groupedReport(rows,kind){const m=new Map;for(const r of rows){const id=kind==='third'?r.terceroId:r.centroId,label=kind==='third'?(r.tercero||'Sin tercero'):(r.centro||'Sin centro'),x=m.get(id||'none')||{label,count:0,d:0,c:0};x.count++;x.d+=r.debito;x.c+=r.credito;m.set(id||'none',x)}return reportHeader(kind==='third'?'Auxiliar por tercero':'Informe por centro de costo')+tableHtml([kind==='third'?'Tercero':'Centro','Líneas','Débito','Crédito','Saldo neto'],[...m.values()].map(x=>[x.label,x.count,money(x.d),money(x.c),money(x.d-x.c)]),[1,2,3,4])}
async function auditReport(){const all=(await DB.getAllIndex('auditoria','empresaId',app.company.id)).sort((a,b)=>b.fecha.localeCompare(a.fecha));return reportHeader('Historial de auditoría')+tableHtml(['Fecha','Usuario / rol','Acción','Registro','Descripción'],all.map(a=>[new Date(a.fecha).toLocaleString('es-CO'),`${a.usuario} · ${a.rol}`,a.accion,a.registroAfectado||'—',a.descripcion||'']),[])}

async function renderClosures(){const annual=await yearClosure(),months=Array.from({length:12},(_,i)=>`${app.year}-${String(i+1).padStart(2,'0')}`);document.getElementById('closures').innerHTML=pageHead('Cierres contables','Cierres mensuales independientes y cierre anual definitivo')+`<div class="notice danger" style="margin-bottom:14px">Los meses cerrados no pueden reabrirse desde la interfaz ordinaria. Las correcciones posteriores se registran manualmente en un mes abierto.</div><div class="grid grid-2"><div class="card"><h3>Cierres mensuales</h3><div class="table-wrap"><table><thead><tr><th>Periodo</th><th>Estado</th><th>Comprobantes</th><th class="num">Débitos</th><th></th></tr></thead><tbody>${months.map(m=>{const c=app.closures.find(x=>x.anioMes===m);return `<tr><td><b>${m}</b></td><td>${c?badge('CERRADO'):badge('ABIERTO')}</td><td>${c?.cantidadComprobantes??'—'}</td><td class="num">${c?money(c.totalDebitos):'—'}</td><td>${!c&&canAdmin()?`<button class="btn danger small" onclick="prepareMonthlyClose('${m}')">Cerrar</button>`:''}</td></tr>`}).join('')}</tbody></table></div></div><div class="card"><h3>Cierre anual ${app.year}</h3>${annual?`<div class="notice danger">Vigencia cerrada definitivamente el ${new Date(annual.fechaCierre).toLocaleString('es-CO')}.</div><p>Huella:</p><div class="hash">${annual.huella}</div>`:`<p>Requiere los doce meses cerrados, ausencia de borradores e integridad verificada.</p><div class="progress"><span style="width:${app.closures.length/12*100}%"></span></div><p>${app.closures.length} de 12 meses cerrados</p>${canAdmin()?'<button class="btn danger" onclick="prepareAnnualClose()">Cerrar vigencia</button>':''}`}</div></div>`}
async function prepareMonthlyClose(m){if(!canAdmin())return toast('Solo el administrador puede cerrar periodos');const integrityCheck=await verifyIntegrity(false);if(integrityCheck.estado==='COMPROMETIDA')return toast('La integridad está comprometida');const monthNum=Number(m.slice(5)),prior=Array.from({length:monthNum-1},(_,i)=>`${app.year}-${String(i+1).padStart(2,'0')}`);if(!app.config.permitirCierreDesordenado&&prior.some(x=>!app.closures.find(c=>c.anioMes===x)))return toast('Debe cerrar primero los meses anteriores');const all=await DB.getAllIndex('comprobantes','empresaAnioMes',[app.company.id,m]),drafts=all.filter(v=>v.estado==='BORRADOR'),confirmed=all.filter(v=>v.estado==='CONFIRMADO'),tot=confirmed.reduce((a,v)=>{const t=totalLineas(v);a.d+=t.d;a.c+=t.c;return a},{d:0,c:0});if(drafts.length)return toast(`Existen ${drafts.length} borradores en ${m}`);if(Math.abs(tot.d-tot.c)>=.01)return toast('La igualdad global entre débitos y créditos no se cumple');showModal(`Cerrar mes ${m}`,`<div class="notice danger">Esta acción es irreversible desde la interfaz ordinaria.</div><div class="diag-grid" style="margin-top:14px"><div class="diag-item"><b>Comprobantes confirmados</b>${confirmed.length}</div><div class="diag-item"><b>Total débitos</b>${money(tot.d)}</div><div class="diag-item"><b>Total créditos</b>${money(tot.c)}</div><div class="diag-item"><b>Diferencia</b>${money(tot.d-tot.c)}</div></div><div class="field" style="margin-top:14px"><label>Contraseña para el respaldo cifrado previo</label><input id="closePass" type="password"></div><div class="field" style="margin-top:10px"><label>Escriba exactamente CERRAR</label><input id="closeConfirm"></div>`,async()=>{if(val('closeConfirm')!=='CERRAR'||val('closePass').length<8)return toast('Escriba CERRAR y use una contraseña de al menos 8 caracteres');await exportBackup({type:'MONTH',year:app.year,month:m,password:val('closePass'),automatic:true});const payload={empresaId:app.company.id,anioMes:m,cantidad:confirmed.length,debitos:tot.d,creditos:tot.c,usuario:app.session.user.id,fecha:now()};const h=await sha256(canonical(payload));const c={id:uid('cie'),empresaId:app.company.id,vigencia:app.year,anioMes:m,tipo:'MENSUAL',estado:'CERRADO',fechaCierre:payload.fecha,usuarioId:app.session.user.id,cantidadComprobantes:confirmed.length,totalDebitos:tot.d,totalCreditos:tot.c,huella:h};await DB.put('cierres',c);await audit('CIERRE_MENSUAL',c.id,`${m}: ${confirmed.length} comprobantes`,null,c);closeModal();await loadContext();renderClosures();toast(`Mes ${m} cerrado`)})}
async function prepareAnnualClose(){if(app.closures.length!==12)return toast('Deben estar cerrados los doce meses');const integrityCheck=await verifyIntegrity(false);if(integrityCheck.estado==='COMPROMETIDA')return toast('La integridad está comprometida');const drafts=await DB.countIndex('comprobantes','empresaVigenciaEstado',[app.company.id,app.year,'BORRADOR']);if(drafts)return toast(`Existen ${drafts} borradores`);const trial=await trialData(),d=trial.reduce((s,x)=>s+x.debito,0),c=trial.reduce((s,x)=>s+x.credito,0);showModal(`Cierre anual ${app.year}`,`<div class="notice danger">La vigencia quedará bloqueada definitivamente. El comprobante de cierre y la apertura del año siguiente deben elaborarse manualmente.</div>${mathCheck(d,c)}<p>Se generarán como referencia el balance de prueba, el estado de situación financiera y el estado de resultados a partir de comprobantes confirmados.</p><div class="field"><label>Contraseña para respaldo cifrado de cierre</label><input id="annualPass" type="password"></div><div class="field" style="margin-top:10px"><label>Escriba CERRAR ${app.year}</label><input id="annualConfirm"></div>`,async()=>{if(val('annualConfirm')!==`CERRAR ${app.year}`||val('annualPass').length<8)return toast('La confirmación o contraseña no cumple');await exportBackup({type:'YEAR',year:app.year,password:val('annualPass'),automatic:true});const payload={empresaId:app.company.id,vigencia:app.year,fecha:now(),debitos:d,creditos:c,meses:12,usuario:app.session.user.id};const h=await sha256(canonical(payload));const cl={id:uid('cie'),empresaId:app.company.id,vigencia:app.year,anioMes:String(app.year),tipo:'ANUAL',estado:'CERRADO',fechaCierre:payload.fecha,usuarioId:app.session.user.id,totalDebitos:d,totalCreditos:c,huella:h};await DB.put('cierres',cl);const period=await DB.get('periodos',`${app.company.id}_${app.year}`);if(period){period.estado='CERRADO';period.fechaCierre=now();await DB.put('periodos',period)}await audit('CIERRE_ANUAL',cl.id,`Vigencia ${app.year} cerrada`,null,cl);closeModal();await loadContext();renderClosures();toast('Vigencia cerrada')})}

async function verifyIntegrity(notify=false){const vs=(await DB.getAllIndex('comprobantes','empresaVigencia',[app.company.id,app.year])).filter(v=>['CONFIRMADO','ANULADO'].includes(v.estado)).sort((a,b)=>(a.integridadOrden||0)-(b.integridadOrden||0)||(a.confirmadoEn||'').localeCompare(b.confirmadoEn||'')),issues=[];let prev='';for(const v of vs){const expected=await voucherHash(v,prev);if(v.hashAnterior!==prev||v.huella!==expected)issues.push({numero:v.numero,esperada:expected,registrada:v.huella});prev=v.huella||''}const estado=issues.length?'COMPROMETIDA':'VERIFICADA',r={id:uid('int'),empresaId:app.company.id,vigencia:app.year,tipo:'ESTADO',fecha:now(),estado,cantidad:vs.length,problemas:issues};await DB.put('integridad',r);await audit('VERIFICACION_INTEGRIDAD',r.id,`${estado}: ${vs.length} comprobantes, ${issues.length} problemas`,null,r);app.integrity=estado;updateHeader();if(app.currentView==='diagnostics')renderDiagnostics();if(notify)toast(issues.length?`Integridad comprometida: ${issues.length} problema(s)`:'Cadena de integridad verificada');return r}

function renderUsers(){if(!canAdmin())return document.getElementById('users').innerHTML='<div class="permission-denied">Solo el administrador puede gestionar usuarios.</div>';document.getElementById('users').innerHTML=pageHead('Usuarios y roles','Estudiantes sin contraseña; cuentas administrativas protegidas con PBKDF2','<button class="btn primary" onclick="openUser()">+ Usuario</button>')+`<div class="notice info" style="margin-bottom:14px">Los perfiles de estudiante pueden crearse automáticamente desde la pantalla de ingreso usando nombre y grupo.</div><div class="card"><div class="table-wrap"><table><thead><tr><th>Nombre</th><th>Grupo</th><th>Usuario interno</th><th>Rol</th><th>Acceso</th><th>Estado</th><th></th></tr></thead><tbody>${app.users.map(u=>`<tr><td><b>${esc(u.nombre)}</b></td><td>${esc(u.grupo||'—')}</td><td>${esc(u.username)}</td><td>${esc(u.rol)}</td><td>${u.rol==='Estudiante'?badge('Sin contraseña'):'Contraseña'}</td><td>${badge(u.estado)}</td><td class="right"><button class="btn small" onclick="openUser('${u.id}')">Editar</button></td></tr>`).join('')}</tbody></table></div></div>`}
function openUser(id=''){const u=app.users.find(x=>x.id===id)||{nombre:'',grupo:'',username:'',rol:'Estudiante',estado:'ACTIVO'};showModal(id?'Editar usuario':'Nuevo usuario',`<div class="form-grid"><div class="field span-6"><label>Nombre</label><input id="uName" value="${esc(u.nombre)}"></div><div class="field span-3"><label>Grupo (estudiantes)</label><input id="uGroup" value="${esc(u.grupo||'')}" placeholder="Ejemplo: 8°A"></div><div class="field span-3"><label>Usuario interno</label><input id="uUsername" value="${esc(u.username)}" ${id?'readonly':''} placeholder="Se genera si queda vacío"></div><div class="field span-4"><label>Rol</label><select id="uRole">${Object.keys(roles).map(x=>`<option ${u.rol===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field span-4"><label>Estado</label><select id="uState"><option>ACTIVO</option><option ${u.estado==='INACTIVO'?'selected':''}>INACTIVO</option></select></div><div class="field span-12"><label>${id?'Nueva contraseña (opcional; no se usa para estudiantes)':'Contraseña (obligatoria para roles administrativos)'}</label><input id="uPass" type="password" minlength="8"></div></div>`,async()=>{const pass=val('uPass'),role=val('uRole'),name=val('uName').trim(),group=val('uGroup').trim();let username=val('uUsername').trim().toLowerCase();if(!name)return toast('El nombre es obligatorio');if(role==='Estudiante'&&!group)return toast('Indique el grupo del estudiante');if(!username){let base=role==='Estudiante'?`est-${studentSlug(group)}-${studentSlug(name)}`:`usr-${studentSlug(name)}`,n=2;username=base||uid('usr');while(app.users.some(x=>x.username===username&&x.id!==id))username=`${base}-${n++}`}if(role!=='Estudiante'&&!id&&pass.length<8)return toast('Los roles administrativos requieren contraseña de mínimo 8 caracteres');const n={...u,id:u.id||uid('usr'),nombre:name,grupo:role==='Estudiante'?group:'',username,rol:role,estado:val('uState'),accesoSinClave:role==='Estudiante',actualizadoEn:now(),creadoEn:u.creadoEn||now()};if(pass){if(pass.length<8)return toast('La contraseña debe tener al menos 8 caracteres');const hp=await hashPassword(pass);n.passwordHash=hp.hash;n.passwordSalt=hp.salt;n.passwordIteraciones=hp.iterations}if(role!=='Estudiante'&&!n.passwordHash)return toast('El usuario administrativo debe tener contraseña');try{await DB.put('usuarios',n)}catch(e){return toast('El nombre de usuario ya existe')}await audit(id?'USUARIO_MODIFICADO':'USUARIO_CREADO',n.id,n.username,u,{...n,passwordHash:n.passwordHash?'PROTEGIDO':'NO APLICA',passwordSalt:n.passwordSalt?'PROTEGIDO':'NO APLICA'});closeModal();await loadContext();renderUsers();toast('Usuario guardado')})}

function renderBackup(){document.getElementById('backup').innerHTML=pageHead('Copias de seguridad','Respaldos JSON cifrados con AES-GCM y PBKDF2')+`<div class="grid grid-2"><div class="card"><h3>Exportar respaldo</h3><div class="field"><label>Alcance</label><select id="backupScope"><option value="GENERAL">General</option><option value="COMPANY">Empresa activa</option><option value="YEAR">Vigencia activa</option><option value="MONTH">Mes específico</option></select></div><div class="field" style="margin-top:10px"><label>Mes (para respaldo mensual)</label><input id="backupMonth" type="month" value="${app.year}-01"></div><div class="field" style="margin-top:10px"><label>Contraseña de cifrado</label><input id="backupPass" type="password"></div><button class="btn primary" style="margin-top:14px" onclick="manualBackup()">Exportar cifrado</button></div><div class="card"><h3>Restaurar respaldo</h3><div class="field"><label>Archivo .ctbackup.json</label><input id="restoreFile" type="file" accept=".json,application/json"></div><div class="field" style="margin-top:10px"><label>Contraseña</label><input id="restorePass" type="password"></div><button class="btn" style="margin-top:14px" onclick="previewRestore()">Validar y mostrar vista previa</button><div id="restorePreview" style="margin-top:14px"></div></div></div><div class="notice" style="margin-top:16px">Guarde la contraseña fuera de la aplicación. Sin ella no es posible recuperar el respaldo. Antes de cierres y migraciones se exige una copia previa.</div>`}
async function collectBackup(scope){const data={};for(const s of STORES){let rows=await DB.getAll(s);if(scope.type!=='GENERAL'&&s!=='configuracion'&&s!=='usuarios'){rows=rows.filter(r=>!r.empresaId||r.empresaId===app.company.id);if(scope.type==='YEAR')rows=rows.filter(r=>r.vigencia===undefined||Number(r.vigencia)===Number(scope.year));if(scope.type==='MONTH')rows=rows.filter(r=>r.anioMes===undefined||r.anioMes===scope.month)}data[s]=rows}return data}
async function encryptEnvelope(payload,password,meta){const salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12)),key=await deriveKey(password,salt,['encrypt']),plain=new TextEncoder().encode(JSON.stringify(payload)),cipher=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,plain);return{format:'ContaTecnicaBackup',schemaVersion:SCHEMA_VERSION,createdAt:now(),meta,salt:bytesToB64(salt),iv:bytesToB64(iv),ciphertext:bytesToB64(cipher),iterations:210000,hash:await sha256(JSON.stringify(payload))}}
async function decryptEnvelope(env,password){if(env.format!=='ContaTecnicaBackup'||!env.ciphertext)throw new Error('Formato de respaldo no reconocido');const key=await deriveKey(password,b64ToBytes(env.salt),['decrypt']),plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64ToBytes(env.iv)},key,b64ToBytes(env.ciphertext)),payload=JSON.parse(new TextDecoder().decode(plain));if(await sha256(JSON.stringify(payload))!==env.hash)throw new Error('La huella del respaldo no coincide');return payload}
async function exportBackup({type='GENERAL',year=app.year,month='',password,automatic=false}){const data=await collectBackup({type,year,month}),payload={schemaVersion:SCHEMA_VERSION,exportedAt:now(),scope:{type,empresaId:app.company.id,year,month},data},env=await encryptEnvelope(payload,password,{empresa:app.company.nombre,vigencia:year,mes:month,tipo:type});downloadBlob(new Blob([JSON.stringify(env,null,2)],{type:'application/json'}),`contatecnica_${type.toLowerCase()}_${month||year||today()}_${today()}.ctbackup.json`);await audit('RESPALDO_EXPORTADO','',`${type} ${month||year||''}${automatic?' previo a cierre':''}`);return env}
async function manualBackup(){const p=val('backupPass'),type=val('backupScope');if(p.length<8)return toast('Use una contraseña de al menos 8 caracteres');await exportBackup({type,year:app.year,month:val('backupMonth'),password:p});toast('Respaldo cifrado exportado')}
let restorePayload=null;
async function previewRestore(){const f=document.getElementById('restoreFile').files[0],p=val('restorePass');if(!f||!p)return toast('Seleccione el archivo y escriba la contraseña');try{const env=JSON.parse(await f.text());restorePayload=await decryptEnvelope(env,p);if(Number(restorePayload.schemaVersion)>SCHEMA_VERSION)throw new Error('El respaldo pertenece a una versión más nueva');const counts=Object.entries(restorePayload.data).map(([k,v])=>`${k}: ${Array.isArray(v)?v.length:0}`).join('<br>');document.getElementById('restorePreview').innerHTML=`<div class="notice ok"><b>Respaldo válido</b><br>${counts}</div><label class="smalltext"><input id="replaceExisting" type="checkbox"> Reemplazar registros con el mismo identificador</label><div class="field" style="margin-top:10px"><label>Escriba RESTAURAR</label><input id="restoreConfirm"></div><button class="btn danger" style="margin-top:10px" onclick="restoreBackup()">Restaurar ahora</button>`;await audit('RESPALDO_VALIDADO','',f.name)}catch(e){restorePayload=null;document.getElementById('restorePreview').innerHTML=`<div class="notice danger">${esc(e.message||'No se pudo abrir el respaldo')}</div>`}}
async function restoreBackup(){if(!restorePayload||val('restoreConfirm')!=='RESTAURAR')return toast('Escriba RESTAURAR');const replace=document.getElementById('replaceExisting').checked;let ins=0,skip=0;for(const [s,rows] of Object.entries(restorePayload.data)){if(!STORES.includes(s)||!Array.isArray(rows))continue;for(const r of rows){const exists=await DB.get(s,r.id);if(exists&&!replace){skip++;continue}try{await DB.put(s,r);ins++}catch(e){skip++}}}await audit('RESPALDO_RESTAURADO','',`Insertados/reemplazados ${ins}; omitidos ${skip}`);restorePayload=null;await loadContext();renderBackup();toast(`Restauración finalizada: ${ins} registros`)}

async function renderDiagnostics(){const est=await navigator.storage?.estimate?.()||{},int=(await DB.getAllIndex('integridad','empresaVigencia',[app.company.id,app.year])).filter(x=>x.tipo==='ESTADO').sort((a,b)=>b.fecha.localeCompare(a.fecha))[0],counts={};for(const s of STORES)counts[s]=(await DB.getAll(s)).length;document.getElementById('diagnostics').innerHTML=pageHead('Diagnóstico','Almacenamiento, compatibilidad e integridad','<button class="btn info" onclick="verifyIntegrity(true)">Verificar integridad</button>')+`<div class="grid grid-2"><div class="card"><h3>Compatibilidad</h3><div class="diag-grid"><div class="diag-item"><b>IndexedDB</b>${'indexedDB'in window?'Disponible':'No disponible'}</div><div class="diag-item"><b>Web Crypto</b>${crypto?.subtle?'Disponible':'No disponible'}</div><div class="diag-item"><b>Almacenamiento usado</b>${((est.usage||0)/1024/1024).toFixed(2)} MB</div><div class="diag-item"><b>Cuota estimada</b>${((est.quota||0)/1024/1024).toFixed(2)} MB</div></div></div><div class="card"><h3>Integridad</h3><p>Estado: ${badge(app.integrity)}</p><p>Última verificación: ${int?new Date(int.fecha).toLocaleString('es-CO'):'No realizada'}</p><p>Problemas detectados: ${int?.problemas?.length||0}</p><div class="notice info smalltext">La cadena SHA-256 mejora la detección de cambios. No sustituye una firma digital certificada, controles del sistema operativo ni una aplicación nativa endurecida.</div></div></div><div class="card" style="margin-top:16px"><h3>Registros por almacén</h3><div class="diag-grid">${Object.entries(counts).map(([k,v])=>`<div class="diag-item"><b>${k}</b>${v}</div>`).join('')}</div></div><div class="card" style="margin-top:16px"><h3>Migración</h3><p>Estado: ${app.config.migracionCompletada?'Completada':'No ejecutada'}</p><p>Fecha: ${app.config.migracionFecha?new Date(app.config.migracionFecha).toLocaleString('es-CO'):'—'}</p><p>Origen: ${esc(app.config.migracionClave||'—')}</p></div>`}

function renderSettings(){document.getElementById('settings').innerHTML=pageHead('Configuración institucional','Datos generales, vigencia y opciones pedagógicas')+`<div class="grid grid-2"><div class="card"><h3>Institución</h3><div class="form-grid"><div class="field span-12"><label>Nombre</label><input id="sInstitution" value="${esc(app.config.institucion)}" ${canAdmin()?'':'readonly'}></div><div class="field span-4"><label>DANE</label><input id="sDane" value="${esc(app.config.dane)}" ${canAdmin()?'':'readonly'}></div><div class="field span-4"><label>Departamento</label><input id="sDepartment" value="${esc(app.config.departamento)}" ${canAdmin()?'':'readonly'}></div><div class="field span-4"><label>Municipio</label><input id="sCity" value="${esc(app.config.municipio)}" ${canAdmin()?'':'readonly'}></div><div class="field span-4"><label>Vigencia activa</label><input id="sYear" type="number" value="${app.year}" ${canAdmin()?'':'readonly'}></div></div>${canAdmin()?'<button class="btn primary" style="margin-top:14px" onclick="saveSettings()">Guardar</button>':''}</div><div class="card"><h3>Controles</h3><label><input id="sStudentConfirm" type="checkbox" ${app.config.estudiantePuedeConfirmar?'checked':''} ${canAdmin()?'':'disabled'}> Permitir que estudiantes confirmen comprobantes</label><p class="smalltext muted">Si está desactivado, solo pueden guardar borradores.</p><label><input id="sOutOrder" type="checkbox" ${app.config.permitirCierreDesordenado?'checked':''} ${canAdmin()?'':'disabled'}> Autorizar cierres mensuales fuera de orden</label><p class="smalltext muted">Se recomienda mantenerlo desactivado.</p><hr style="border:0;border-top:1px solid var(--border);margin:20px 0"><h3>Tipos de comprobante</h3><div class="table-wrap"><table><thead><tr><th>Código</th><th>Nombre</th><th>Estado</th></tr></thead><tbody>${app.types.map(t=>`<tr><td>${t.codigo}</td><td>${t.nombre}</td><td>${badge(t.estado)}</td></tr>`).join('')}</tbody></table></div></div></div>`}
async function saveSettings(){if(!canAdmin())return;const newYear=Number(val('sYear'));if(newYear<2000||newYear>2100)return toast('Vigencia inválida');Object.assign(app.config,{institucion:val('sInstitution'),dane:val('sDane'),departamento:val('sDepartment'),municipio:val('sCity'),vigenciaActiva:newYear,estudiantePuedeConfirmar:document.getElementById('sStudentConfirm').checked,permitirCierreDesordenado:document.getElementById('sOutOrder').checked,actualizadoEn:now()});await DB.put('configuracion',app.config);if(!await DB.get('periodos',`${app.company.id}_${newYear}`))await DB.put('periodos',{id:`${app.company.id}_${newYear}`,empresaId:app.company.id,vigencia:newYear,estado:'ABIERTO',cantidadConfirmados:0,totalDebitos:0,totalCreditos:0,creadoEn:now()});await audit('CONFIGURACION_MODIFICADA','principal',`Vigencia activa ${newYear}`);app.voucherPage=1;await loadContext();renderSettings();toast('Configuración guardada')}

function showModal(title,body,onSave,extra='',locked=false){const m=document.getElementById('modal');m.innerHTML=`<div class="modal-head"><h3>${esc(title)}</h3><button class="btn small" onclick="closeModal()">Cerrar</button></div><div class="modal-body">${body}</div><div class="modal-foot">${extra}${!locked?'<button class="btn primary" id="modalSave">Guardar</button>':''}</div>`;document.getElementById('modalBackdrop').classList.add('show');if(!locked&&onSave)document.getElementById('modalSave').onclick=onSave}
function closeModal(){document.getElementById('modalBackdrop').classList.remove('show');window.voucherDraft=null}
document.getElementById('modalBackdrop').addEventListener('click',e=>{if(e.target.id==='modalBackdrop')closeModal()});
function val(id){return document.getElementById(id)?.value?.trim?.()??''}
function downloadBlob(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function xmlCell(v,type='String'){return `<Cell><Data ss:Type="${type}">${String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}</Data></Cell>`}
function exportXls(name,headers,rows){const xml=`<?xml version="1.0"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"><Worksheet ss:Name="Datos"><Table><Row>${headers.map(h=>xmlCell(h)).join('')}</Row>${rows.map(r=>`<Row>${r.map(v=>xmlCell(v,typeof v==='number'?'Number':'String')).join('')}</Row>`).join('')}</Table></Worksheet></Workbook>`;downloadBlob(new Blob([xml],{type:'application/vnd.ms-excel'}),`${name}.xls`)}
function exportAccounts(){exportXls(`plan_cuentas_${app.year}`,['Código','Nombre','Nivel','Naturaleza','Estado'],app.accounts.map(a=>[a.codigo,a.nombre,a.nivel,a.naturaleza,a.estado]))}
function exportThirds(){exportXls(`terceros_${app.year}`,['Tipo persona','Tipo documento','Identificación','DV','Nombre','Dirección','Departamento','Municipio','Código municipio','País','Teléfono','Correo','Responsabilidades','Estado'],app.thirds.map(t=>[t.tipoPersona,t.tipoDocumento,t.numeroIdentificacion,t.digitoVerificacion,t.nombreCompleto||t.razonSocial,t.direccion,t.departamento,t.municipio,t.codigoMunicipio,t.pais,t.telefono,t.correo,t.responsabilidadesTributarias,t.estado]))}
async function exportCurrentReport(){const rows=await reportRows();if(app.bookTab==='journal'||app.bookTab==='ledger'||app.bookTab==='accountsAux')exportXls(`${app.bookTab}_${app.year}`,['Fecha','Comprobante','Cuenta','Nombre','Concepto','Detalle','Tercero','Centro','Débito','Crédito'],rows.map(r=>[r.fecha,r.numero,r.codigo,r.nombre,r.concepto,r.detalle,r.tercero,r.centro,r.debito,r.credito]));else if(app.bookTab==='trial'||app.bookTab==='position'||app.bookTab==='income'||app.bookTab==='compare'){const t=await trialData();exportXls(`${app.bookTab}_${app.year}`,['Código','Cuenta','Débito','Crédito','Saldo débito','Saldo crédito'],t.map(x=>[x.codigo,x.nombre,x.debito,x.credito,x.saldoDebito,x.saldoCredito]))}else if(app.bookTab==='audit'){const a=await DB.getAllIndex('auditoria','empresaId',app.company.id);exportXls(`auditoria_${app.year}`,['Fecha','Usuario','Rol','Acción','Registro','Descripción'],a.map(x=>[x.fecha,x.usuario,x.rol,x.accion,x.registroAfectado,x.descripcion]))}else{const kind=app.bookTab==='thirdsAux'?'third':'center',m=new Map;for(const r of rows){const label=kind==='third'?(r.tercero||'Sin tercero'):(r.centro||'Sin centro'),x=m.get(label)||{d:0,c:0,count:0};x.d+=r.debito;x.c+=r.credito;x.count++;m.set(label,x)}exportXls(`${app.bookTab}_${app.year}`,['Agrupación','Líneas','Débito','Crédito'],[...m].map(([k,x])=>[k,x.count,x.d,x.c]))}await audit('INFORME_EXPORTADO','',app.bookTab);toast('Archivo Excel generado')}
function printCurrent(){window.print();audit('INFORME_PDF_IMPRESION','',app.currentView)}
async function printVoucher(id){const v=await DB.get('comprobantes',id),t=totalLineas(v),w=window.open('','_blank');w.document.write(`<html><head><title>${esc(v.numero)}</title><style>body{font-family:Arial;padding:30px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #bbb;padding:7px;font-size:12px}th{background:#eee}.num{text-align:right}.hash{font-family:monospace;font-size:9px;word-break:break-all}</style></head><body><h2>${esc(app.company.nombre)}</h2><p>NIT ${esc(app.company.nit||'—')} · ${esc(v.numero)} · ${esc(v.fecha)} · ${esc(typeObj(v.tipoComprobanteId).nombre)}</p><p><b>Concepto:</b> ${esc(v.concepto)} · <b>Estado:</b> ${esc(v.estado)}</p><table><thead><tr><th>Cuenta</th><th>Tercero</th><th>Centro</th><th>Detalle</th><th>Débito</th><th>Crédito</th></tr></thead><tbody>${v.lineas.map(l=>`<tr><td>${esc(l.codigoCuenta)} · ${esc(accountName(l.cuentaId))}</td><td>${esc(thirdName(l.terceroId))}</td><td>${esc(centerName(l.centroCostoId))}</td><td>${esc(l.detalle)}</td><td class="num">${l.debito?money(l.debito):''}</td><td class="num">${l.credito?money(l.credito):''}</td></tr>`).join('')}<tr><th colspan="4">Totales</th><th>${money(t.d)}</th><th>${money(t.c)}</th></tr></tbody></table><p class="hash"><b>Huella:</b> ${esc(v.huella||'—')}</p><p style="margin-top:60px">Elaboró: ____________________ &nbsp;&nbsp; Revisó: ____________________</p><script>window.onload=()=>window.print()<\/script>
</body></html>`);w.document.close();await audit('COMPROBANTE_IMPRESO',id,v.numero)}

async function bootstrap(){try{if(!('indexedDB'in window)||!crypto?.subtle)throw new Error('Este navegador no admite IndexedDB o Web Crypto');await DB.open();await ensureSeed();app.config=await DB.get('configuracion','principal');if(await restoreSession())await startApp();else showAuth()}catch(e){document.body.innerHTML=`<div style="font-family:Arial;padding:40px"><h1>No se pudo iniciar ContaTécnica</h1><p>${esc(e.message)}</p><p>Use una versión reciente de Chrome, Edge o Firefox y permita el almacenamiento local del navegador.</p></div>`;console.error(e)}}
bootstrap();
</script>
</body></html>
