name: Validar y publicar ContaTécnica

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Reconstruir y validar HTML
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import base64
          import gzip
          import hashlib
          import shutil

          expected = '18c6ea96909a407589578823164fbeb4dc19f46f76f085b11faafcf280c23fbb'
          parts = [Path(f'app/fase3-0{i}.dat') for i in range(1, 5)]
          missing = [str(path) for path in parts if not path.exists()]
          if missing:
              raise SystemExit('Faltan archivos: ' + ', '.join(missing))

          encoded = ''.join(path.read_text(encoding='utf-8').strip() for path in parts)
          html = gzip.decompress(base64.b64decode(encoded, validate=True))
          digest = hashlib.sha256(html).hexdigest()
          if digest != expected:
              raise SystemExit(f'Integridad incorrecta: {digest}')

          site = Path('_site')
          if site.exists():
              shutil.rmtree(site)
          site.mkdir()
          (site / 'index.html').write_bytes(html)
          (site / '.nojekyll').touch()
          print(f'HTML validado: {len(html)} bytes, SHA-256 {digest}')
          PY

      - name: Guardar sitio validado
        uses: actions/upload-artifact@v4
        with:
          name: sitio-validado
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar sitio validado
        uses: actions/download-artifact@v4
        with:
          name: sitio-validado
          path: _site

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar publicación
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publicar sitio
        id: deployment
        uses: actions/deploy-pages@v4
