name: Construir rama pública de ContaTécnica Modo Aula

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publicacion-gh-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Reconstruir y validar Modo Aula
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import base64
          import gzip
          import hashlib
          import shutil

          expected_html = '4b9d5d97b994d7e15eb6cdb6562c53f766852f3e983c96d5bc5db1e30592016d'
          expected_parts = [
              ('app/modo-aula-01.dat', 'a2873b2bd0287c713be7e26241dd438fccd3ad7559c48d5edc239bf1a0b18244'),
              ('app/modo-aula-02.dat', '70651b48596e57b71963da060ce0ff83bedbfdfd319019e788f8b027fc60ead0'),
              ('app/modo-aula-03.dat', 'fc0440fa930442d56ad88a379c246d1c850a33d7723128d0954d15423e9e1b17'),
              ('app/modo-aula-04.dat', '2a5594616ab71cbc921c16fda4dcd641bb70d99c0af4ce2634b13ac1050fdcc7'),
              ('app/modo-aula-05.dat', 'fc1b20942d8fc9e93b24706056b032c58a466532227d66e298771711101d2149'),
              ('app/modo-aula-06.dat', 'bab500907b03a048de9464ba4b4441574e7d0fee017eba82961509e40bf706cc'),
              ('app/modo-aula-07.dat', '782f8aee62119645411a6298a9fc4db2c08925ba6cc39d91385c42bf0db6fcc4'),
              ('app/modo-aula-08-09.dat', 'df1675bb684e2d19f80e65948964c4e251993cb5f8c728bcf79380e240d18a02'),
              ('app/modo-aula-10-11.dat', '163597a2babb09801b3f76b0f77f76ce779b6dcb6ac78f868ceabacf5d58dcae'),
              ('app/modo-aula-12-13.dat', '6f7a7a558a4151e9677fd55663adad7346982633d1d7635dabf96f1444d407bb'),
              ('app/modo-aula-14-15.dat', 'b50a7417a5991b8e393ef4a8d98656a01c60649621beb667216c7bc91435b5b6'),
              ('app/modo-aula-16-17.dat', '111d1bf3110da9fff876340128952a5ecc7e062fdda3b082ad0f990967b24913'),
              ('app/modo-aula-18-19.dat', '0a798bd55031bfb1aa2de5de2d299c0e9c8663f6cdaf90db258bdd287d690024'),
              ('app/modo-aula-20-21.dat', 'f94bb24944e5f4f36b96bb08dae90e18e9f452996bb8a518c5d681e5e06e8804'),
          ]

          parts = []
          for name, expected in expected_parts:
              path = Path(name)
              if not path.exists():
                  raise SystemExit(f'Falta {name}')
              data = path.read_bytes()
              digest = hashlib.sha256(data).hexdigest()
              if digest != expected:
                  raise SystemExit(f'Integridad incorrecta en {name}: {digest}')
              parts.append(path)

          encoded = ''.join(path.read_text(encoding='utf-8').strip() for path in parts)
          html = gzip.decompress(base64.b64decode(encoded, validate=True))
          digest = hashlib.sha256(html).hexdigest()
          if digest != expected_html:
              raise SystemExit(f'Integridad incorrecta del HTML: {digest}')

          site = Path('_site')
          if site.exists():
              shutil.rmtree(site)
          site.mkdir()
          (site / 'index.html').write_bytes(html)
          (site / '.nojekyll').touch()
          print(f'Modo Aula validado: {len(html)} bytes, SHA-256 {digest}')
          PY

      - name: Guardar copia validada
        uses: actions/upload-artifact@v4
        with:
          name: contatecnica-modo-aula
          path: _site

      - name: Publicar en rama gh-pages
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          cp _site/index.html /tmp/contatecnica-index.html
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages
          git rm -rf . || true
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp /tmp/contatecnica-index.html index.html
          touch .nojekyll
          git add index.html .nojekyll
          git commit -m "Publicar ContaTécnica Modo Aula [skip ci]"
          git push --force origin gh-pages
