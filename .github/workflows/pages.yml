name: Validar y publicar ContaTécnica

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Reconstruir y validar HTML
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import base64
          import gzip
          import hashlib
          import shutil
          import traceback

          expected_html = '18c6ea96909a407589578823164fbeb4dc19f46f76f085b11faafcf280c23fbb'
          expected_parts = [
              ('app/fase3-01a.dat', 'c12106c5bd5e591d28e18ce66dd7f39391ec2ccc561fe84e8d5b98a798c351f9'),
              ('app/fase3-01b.dat', '2d5fff4d3554f7934a40230061eb534ebc0d926f587e0d0e5743f04e624840f3'),
              ('app/fase3-02a.dat', 'da21a2d0d3b8fced8e8a182ff4853cfafda82ce479f800fc272c701ad3946338'),
              ('app/fase3-03.dat', 'de8682cd191c96b8923b010dd709062a096baf36482a60843fa7030fe84ef887'),
              ('app/fase3-04.dat', '37e5c87688f7b29a5be3879609823aa0bc17a77b9a2b5ee7ffe173c696939140'),
          ]
          diagnostic = Path('_diagnostic')
          diagnostic.mkdir(exist_ok=True)
          report = []

          try:
              parts = []
              for name, expected in expected_parts:
                  path = Path(name)
                  if not path.exists():
                      raise RuntimeError(f'Falta {name}')
                  data = path.read_bytes()
                  digest = hashlib.sha256(data).hexdigest()
                  report.append(f'{name}: bytes={len(data)} sha256={digest} esperado={expected}')
                  if digest != expected:
                      raise RuntimeError(f'Integridad incorrecta en {name}: {digest}')
                  parts.append(path)

              encoded = ''.join(path.read_text(encoding='utf-8').strip() for path in parts)
              compressed = base64.b64decode(encoded, validate=True)
              html = gzip.decompress(compressed)
              digest = hashlib.sha256(html).hexdigest()
              report.append(f'HTML: bytes={len(html)} sha256={digest} esperado={expected_html}')
              if digest != expected_html:
                  raise RuntimeError(f'Integridad incorrecta del HTML: {digest}')

              site = Path('_site')
              if site.exists():
                  shutil.rmtree(site)
              site.mkdir()
              (site / 'index.html').write_bytes(html)
              (site / '.nojekyll').touch()
              print(f'HTML validado: {len(html)} bytes, SHA-256 {digest}')
          except Exception:
              report.append(traceback.format_exc())
              raise
          finally:
              (diagnostic / 'validacion.txt').write_text('\n'.join(report), encoding='utf-8')
          PY

      - name: Guardar diagnóstico si falla
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostico-validacion
          path: _diagnostic

      - name: Guardar sitio validado
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sitio-validado
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar sitio validado
        uses: actions/download-artifact@v4
        with:
          name: sitio-validado
          path: _site

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar publicación
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publicar sitio
        id: deployment
        uses: actions/deploy-pages@v4
